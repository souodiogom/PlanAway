<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanAway - Detalhes da Viagem</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/trip.css" />
  <link rel="stylesheet" href="css/trip-budget.css" />
  <link rel="stylesheet" href="css/trip-itinerary.css" />
  <link rel="stylesheet" href="css/trip-activities.css" />
  <link rel="stylesheet" href="css/trip-records.css" />
</head>
<body>
  <header class="site-header site-header--blue">
    <a class="logo" href="index.html">Plan<span>Away✈</span></a>
    <nav class="site-nav">
      <a class="site-nav__link site-nav__link--yellow" href="index.html">Home</a>
      <a class="site-nav__link site-nav__link--yellow" href="create-trip.html">Viagens</a>
      <a class="site-nav__link site-nav__link--yellow" href="itinerary.html">Itinerário</a>
      <a class="site-nav__link site-nav__link--yellow" href="budget.html">Budget</a>
    </nav>
    <a class="site-header__profile" href="profile.html">O meu perfil</a>
  </header>

<main class="page-shell page-shell--trip">
  <h1 class="page-title">DETALHES DA VIAGEM</h1>

  <section id="tripSummary" class="trip-summary card card--dark">A carregar viagem...</section>

  <div class="trip-main-actions">
    <button type="button" class="button button--secondary" id="editTripButton">
      Editar viagem
    </button>

    <button type="button" class="button button--danger" id="deleteTripButton">
      Eliminar viagem
    </button>
  </div>

  <section class="trip-panels">
    <div class="trip-panel-block">
      <article class="card card--soft">
        <h2 class="panel-title">Hotéis</h2>

        <ul class="bullet-list" id="hotelList">
          <li>Sem alojamento registado</li>
        </ul>
      </article>

      <div class="trip-panel-actions">
        <a class="button button--primary" id="addHotelLink" href="add-hotel.html">Adicionar</a>
        <a class="button button--secondary" id="openHotelsLink" href="hotels.html">Editar</a>
      </div>
    </div>

    <div class="trip-panel-block">
      <article class="card card--soft">
        <h2 class="panel-title">Transportes</h2>

        <ul class="bullet-list" id="transportList">
          <li>Sem transporte registado</li>
        </ul>
      </article>

      <div class="trip-panel-actions">
        <a class="button button--primary" id="addTransportLink" href="add-transport.html">Adicionar</a>
        <a class="button button--secondary" id="openTransportsLink" href="transports.html">Editar</a>
      </div>
    </div>
  </section>

  <div class="trip-bottom-actions">
    <a class="button button--secondary" id="openActivitiesLink" href="activities.html">Gerir atividades</a>
    <a class="button button--secondary" id="openBudgetLink" href="budget.html">Gerir Budget</a>
  </div>

</main>

  <footer class="site-footer">
    <div class="site-footer__line"></div>
    <div class="site-footer__pill">FOOTER</div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/trip.js"></script>
</body>
</html>
