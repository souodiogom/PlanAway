<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanAway - Login</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/trip.css" />
  <link rel="stylesheet" href="css/trip-budget.css" />
  <link rel="stylesheet" href="css/trip-itinerary.css" />
  <link rel="stylesheet" href="css/trip-activities.css" />
  <link rel="stylesheet" href="css/trip-records.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <h1 class="auth-logo">Plan<span>Away✈</span></h1>
      <form class="auth-form card card--form">
        <label class="form-field">
          <span class="form-field__label">Email</span>
          <input type="email" placeholder="email@exemplo.com" />
        </label>
        <label class="form-field">
          <span class="form-field__label">Password</span>
          <input type="password" placeholder="********" />
        </label>
        <button type="button" class="button button--primary">Entrar</button>
      </form>
      <p class="auth-helper">Ainda não tens conta? <a href="register.html">Registar</a></p>
    </div>
  </main>
</body>
</html>
